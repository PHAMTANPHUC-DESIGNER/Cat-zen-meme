<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mèo Vô Tri Khấn Phật - Tích Công Đức Online</title>
    <meta name="description" content="Ứng dụng tích công đức online cùng mèo vô tri. Tịnh tâm và thư giãn.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stars-container" id="stars"></div>
    <div class="lotus-container" id="lotus-petals"></div>

    <main class="app-container">
        <header class="header">
            <h1 class="title">MÈO VÔ TRI <span class="accent">KHẤN PHẬT</span></h1>
            <p class="subtitle">Tâm bất biến giữa dòng đời vạn biến</p>
        </header>

        <section class="cat-section">
            <div class="aura"></div>
            <div class="cat-frame">
                <svg id="cat-image" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" class="cat-svg">
                    <defs>
                        <style>
                            @keyframes tailSwish { 
                                0%, 100% { transform: rotate(-15deg); }
                                25% { transform: rotate(5deg); }
                                75% { transform: rotate(-20deg); }
                            }
                            @keyframes earPerk {
                                0%, 100% { transform: rotate(0deg); }
                                25% { transform: rotate(-8deg); }
                                75% { transform: rotate(3deg); }
                            }
                            @keyframes eyeShine {
                                0%, 100% { opacity: 1; }
                                50% { opacity: 0.6; }
                            }
                            @keyframes mouthBobble {
                                0%, 100% { transform: scale(1); }
                                50% { transform: scale(1.1); }
                            }
                            @keyframes pawPad {
                                0%, 100% { transform: translateY(0px); }
                                50% { transform: translateY(-2px); }
                            }
                            .tail { transform-origin: 240px 160px; animation: tailSwish 2s infinite ease-in-out; }
                            .ear-l { transform-origin: 85px 60px; animation: earPerk 2.5s infinite ease-in-out; }
                            .ear-r { transform-origin: 215px 60px; animation: earPerk 2.5s infinite ease-in-out 0.3s; }
                            .eye-shine { animation: eyeShine 3s infinite ease-in-out; }
                            .mouth { animation: mouthBobble 2s infinite ease-in-out; }
                            .paw { animation: pawPad 1.5s infinite ease-in-out; }
                        </style>
                    </defs>

                    <!-- Tail -->
                    <path class="tail" d="M 240 160 Q 270 130 260 80 Q 255 50 245 35" stroke="#FFA366" stroke-width="28" fill="none" stroke-linecap="round"/>
                    <path class="tail" d="M 240 160 Q 270 130 260 80 Q 255 50 245 35" stroke="#FF8C42" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.5"/>

                    <!-- Back Paws (hidden) -->
                    <ellipse cx="100" cy="240" rx="16" ry="20" fill="#E8956D" opacity="0.7"/>
                    <ellipse cx="200" cy="240" rx="16" ry="20" fill="#E8956D" opacity="0.7"/>

                    <!-- Body -->
                    <ellipse cx="150" cy="170" rx="65" ry="75" fill="#FFA366" stroke="#FF8C42" stroke-width="2"/>

                    <!-- Belly -->
                    <ellipse cx="150" cy="185" rx="48" ry="50" fill="#FFD4B4" opacity="0.85"/>

                    <!-- Head -->
                    <circle cx="150" cy="90" r="65" fill="#FFA366" stroke="#FF8C42" stroke-width="2"/>

                    <!-- Face Highlight -->
                    <ellipse cx="160" cy="105" rx="48" ry="42" fill="#FFD4B4" opacity="0.7"/>

                    <!-- Left Ear Outer -->
                    <g class="ear-l">
                        <path d="M 85 60 L 55 15 L 75 50 Z" fill="#FFA366" stroke="#FF8C42" stroke-width="1.5"/>
                    </g>

                    <!-- Left Ear Inner -->
                    <g class="ear-l">
                        <path d="M 82 58 L 62 28 L 74 52 Z" fill="#FFD4B4" opacity="0.9"/>
                    </g>

                    <!-- Right Ear Outer -->
                    <g class="ear-r">
                        <path d="M 215 60 L 245 15 L 225 50 Z" fill="#FFA366" stroke="#FF8C42" stroke-width="1.5"/>
                    </g>

                    <!-- Right Ear Inner -->
                    <g class="ear-r">
                        <path d="M 218 58 L 238 28 L 226 52 Z" fill="#FFD4B4" opacity="0.9"/>
                    </g>

                    <!-- Left Eye White -->
                    <ellipse cx="125" cy="80" rx="16" ry="20" fill="white"/>

                    <!-- Left Eye Shadow -->
                    <ellipse cx="125" cy="87" rx="12" ry="11" fill="#E8F5E9" opacity="0.8"/>

                    <!-- Left Pupil -->
                    <ellipse cx="127" cy="85" rx="9" ry="12" fill="#2C3E50"/>

                    <!-- Left Eye Shine -->
                    <circle cx="130" cy="82" r="3.5" fill="white" class="eye-shine"/>

                    <!-- Right Eye White -->
                    <ellipse cx="175" cy="80" rx="16" ry="20" fill="white"/>

                    <!-- Right Eye Shadow -->
                    <ellipse cx="175" cy="87" rx="12" ry="11" fill="#E8F5E9" opacity="0.8"/>

                    <!-- Right Pupil -->
                    <ellipse cx="173" cy="85" rx="9" ry="12" fill="#2C3E50"/>

                    <!-- Right Eye Shine -->
                    <circle cx="170" cy="82" r="3.5" fill="white" class="eye-shine"/>

                    <!-- Nose -->
                    <path d="M 150 110 L 145 122 L 155 122 Z" fill="#FF6B9D" stroke="#FF4081" stroke-width="0.8"/>

                    <!-- Mouth -->
                    <g class="mouth">
                        <path d="M 150 125 Q 135 138 128 133" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/>
                        <path d="M 150 125 Q 165 138 172 133" stroke="#2C3E50" stroke-width="2" fill="none" stroke-linecap="round"/>
                    </g>

                    <!-- Tongue -->
                    <ellipse cx="150" cy="132" rx="7" ry="5" fill="#FF6B9D" opacity="0.8"/>

                    <!-- Left Whiskers -->
                    <line x1="95" y1="95" x2="45" y2="88" stroke="#2C3E50" stroke-width="1.8" stroke-linecap="round"/>
                    <line x1="95" y1="110" x2="40" y2="115" stroke="#2C3E50" stroke-width="1.8" stroke-linecap="round"/>
                    <line x1="95" y1="125" x2="45" y2="145" stroke="#2C3E50" stroke-width="1.8" stroke-linecap="round"/>

                    <!-- Right Whiskers -->
                    <line x1="205" y1="95" x2="255" y2="88" stroke="#2C3E50" stroke-width="1.8" stroke-linecap="round"/>
                    <line x1="205" y1="110" x2="260" y2="115" stroke="#2C3E50" stroke-width="1.8" stroke-linecap="round"/>
                    <line x1="205" y1="125" x2="255" y2="145" stroke="#2C3E50" stroke-width="1.8" stroke-linecap="round"/>

                    <!-- Front Left Paw -->
                    <g class="paw">
                        <ellipse cx="115" cy="260" rx="18" ry="28" fill="#FFA366" stroke="#FF8C42" stroke-width="1.5"/>
                        <circle cx="105" cy="283" r="8" fill="#FFD4B4"/>
                        <circle cx="118" cy="288" r="8" fill="#FFD4B4"/>
                        <circle cx="130" cy="283" r="8" fill="#FFD4B4"/>
                    </g>

                    <!-- Front Right Paw -->
                    <g class="paw" style="animation-delay: 0.2s;">
                        <ellipse cx="185" cy="260" rx="18" ry="28" fill="#FFA366" stroke="#FF8C42" stroke-width="1.5"/>
                        <circle cx="175" cy="283" r="8" fill="#FFD4B4"/>
                        <circle cx="188" cy="288" r="8" fill="#FFD4B4"/>
                        <circle cx="200" cy="283" r="8" fill="#FFD4B4"/>
                    </g>

                    <!-- Rosy Cheeks -->
                    <circle cx="70" cy="100" r="16" fill="#FFB3BA" opacity="0.35"/>
                    <circle cx="230" cy="100" r="16" fill="#FFB3BA" opacity="0.35"/>
                </svg>
            </div>
                </svg>
            </div>
            <div class="mantra-container">
                <p id="mantra-text">Nam mô A Di Đà Phật...</p>
            </div>
        </section>

        <section class="stats-section">
            <div class="stat-card">
                <span class="label">Công Đức Hiện Tại</span>
                <span id="merit-count" class="value">0</span>
            </div>
        </section>

        <footer class="footer">
            <div class="mo-container" id="mo-button">
                <div class="mo-icon">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="45" fill="#5D4037" stroke="#D4AF37" stroke-width="3"/>
                        <path d="M20 50 Q 50 20 80 50 Q 50 80 20 50" fill="#3E2723" opacity="0.6"/>
                        <circle cx="50" cy="50" r="10" fill="#D4AF37" opacity="0.8"/>
                    </svg>
                </div>
                <span class="mo-label">GÕ MÕ TÍCH CÔNG ĐỨC</span>
            </div>
        </footer>
    </main>

    <div id="float-container"></div>

    <script src="app.js"></script>
</body>
</html>
