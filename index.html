<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mèo Vô Tri Khấn Phật - Tích Công Đức Online</title>
    <meta name="description" content="Ứng dụng tích công đức online cùng mèo vô tri. Tịnh tâm và thư giãn.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stars-container" id="stars"></div>
    <div class="lotus-container" id="lotus-petals"></div>

    <main class="app-container">
        <header class="header">
            <h1 class="title">MÈO VÔ TRI <span class="accent">KHẤN PHẬT</span></h1>
            <p class="subtitle">Tâm bất biến giữa dòng đời vạn biến</p>
        </header>

        <section class="cat-section">
            <div class="aura"></div>
            <div class="cat-frame">
                <svg id="cat-image" viewBox="0 0 300 350" xmlns="http://www.w3.org/2000/svg" class="cat-svg">
                    <defs>
                        <style>
                            @keyframes tailSwish { 
                                0%, 100% { transform: rotate(-20deg); }
                                25% { transform: rotate(10deg); }
                                75% { transform: rotate(-25deg); }
                            }
                            @keyframes earPerk {
                                0%, 100% { transform: rotate(0deg); }
                                25% { transform: rotate(-15deg); }
                                75% { transform: rotate(5deg); }
                            }
                            @keyframes eyeShine {
                                0%, 100% { opacity: 1; }
                                50% { opacity: 0.6; }
                            }
                            @keyframes mouthBobble {
                                0%, 100% { transform: scale(1); }
                                50% { transform: scale(1.1); }
                            }
                            @keyframes pawPad {
                                0%, 100% { transform: translateY(0px); }
                                50% { transform: translateY(-3px); }
                            }
                            .tail { transform-origin: 230px 200px; animation: tailSwish 2s infinite ease-in-out; }
                            .ear-l { transform-origin: 100px 80px; animation: earPerk 2.5s infinite ease-in-out; }
                            .ear-r { transform-origin: 200px 80px; animation: earPerk 2.5s infinite ease-in-out 0.3s; }
                            .eye-shine { animation: eyeShine 3s infinite ease-in-out; }
                            .mouth { animation: mouthBobble 2s infinite ease-in-out; }
                            .paw { animation: pawPad 1.5s infinite ease-in-out; }
                        </style>
                    </defs>
                    
                    <!-- Back Left Paw -->
                    <ellipse cx="90" cy="280" rx="20" ry="28" fill="#E8956D" opacity="0.8"/>
                    <circle cx="90" cy="310" r="16" fill="#E8956D" opacity="0.8"/>
                    
                    <!-- Back Right Paw -->
                    <ellipse cx="210" cy="280" rx="20" ry="28" fill="#E8956D" opacity="0.8"/>
                    <circle cx="210" cy="310" r="16" fill="#E8956D" opacity="0.8"/>
                    
                    <!-- Body -->
                    <ellipse cx="150" cy="220" rx="70" ry="85" fill="#FFA366" stroke="#FF8C42" stroke-width="2"/>
                    
                    <!-- Belly -->
                    <ellipse cx="150" cy="240" rx="55" ry="55" fill="#FFD4B4" opacity="0.9"/>
                    
                    <!-- Tail -->
                    <path class="tail" d="M 230 200 Q 280 150 260 80 Q 250 40 240 20" stroke="#FFA366" stroke-width="35" fill="none" stroke-linecap="round"/>
                    <path class="tail" d="M 230 200 Q 280 150 260 80 Q 250 40 240 20" stroke="#FF8C42" stroke-width="30" fill="none" stroke-linecap="round" opacity="0.6"/>
                    
                    <!-- Head -->
                    <circle cx="150" cy="110" r="70" fill="#FFA366" stroke="#FF8C42" stroke-width="2"/>
                    
                    <!-- Face Highlight -->
                    <ellipse cx="165" cy="130" rx="50" ry="45" fill="#FFD4B4" opacity="0.7"/>
                    
                    <!-- Left Ear Outer -->
                    <g class="ear-l">
                        <path d="M 100 80 L 70 20 L 90 60 Z" fill="#FFA366" stroke="#FF8C42" stroke-width="1.5"/>
                    </g>
                    
                    <!-- Left Ear Inner -->
                    <g class="ear-l">
                        <path d="M 95 75 L 75 35 L 88 65 Z" fill="#FFD4B4" opacity="0.9"/>
                    </g>
                    
                    <!-- Right Ear Outer -->
                    <g class="ear-r">
                        <path d="M 200 80 L 230 20 L 210 60 Z" fill="#FFA366" stroke="#FF8C42" stroke-width="1.5"/>
                    </g>
                    
                    <!-- Right Ear Inner -->
                    <g class="ear-r">
                        <path d="M 205 75 L 225 35 L 212 65 Z" fill="#FFD4B4" opacity="0.9"/>
                    </g>
                    
                    <!-- Left Eye White -->
                    <ellipse cx="120" cy="95" rx="18" ry="22" fill="white"/>
                    
                    <!-- Left Eye Shadow -->
                    <ellipse cx="120" cy="102" rx="14" ry="12" fill="#E8F5E9" opacity="0.8"/>
                    
                    <!-- Left Pupil -->
                    <ellipse cx="122" cy="100" rx="10" ry="13" fill="#2C3E50"/>
                    
                    <!-- Left Eye Shine -->
                    <circle cx="125" cy="97" r="4" fill="white" class="eye-shine"/>
                    
                    <!-- Right Eye White -->
                    <ellipse cx="180" cy="95" rx="18" ry="22" fill="white"/>
                    
                    <!-- Right Eye Shadow -->
                    <ellipse cx="180" cy="102" rx="14" ry="12" fill="#E8F5E9" opacity="0.8"/>
                    
                    <!-- Right Pupil -->
                    <ellipse cx="178" cy="100" rx="10" ry="13" fill="#2C3E50"/>
                    
                    <!-- Right Eye Shine -->
                    <circle cx="175" cy="97" r="4" fill="white" class="eye-shine"/>
                    
                    <!-- Nose -->
                    <path d="M 150 130 L 145 145 L 155 145 Z" fill="#FF6B9D" stroke="#FF4081" stroke-width="1"/>
                    
                    <!-- Mouth -->
                    <g class="mouth">
                        <path d="M 150 145 Q 130 160 120 155" stroke="#2C3E50" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                        <path d="M 150 145 Q 170 160 180 155" stroke="#2C3E50" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    </g>
                    
                    <!-- Tongue -->
                    <ellipse cx="150" cy="152" rx="8" ry="6" fill="#FF6B9D" opacity="0.8"/>
                    
                    <!-- Left Whiskers -->
                    <line x1="80" y1="110" x2="25" y2="100" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
                    <line x1="80" y1="125" x2="20" y2="130" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
                    <line x1="80" y1="140" x2="30" y2="160" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
                    
                    <!-- Right Whiskers -->
                    <line x1="220" y1="110" x2="275" y2="100" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
                    <line x1="220" y1="125" x2="280" y2="130" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
                    <line x1="220" y1="140" x2="270" y2="160" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
                    
                    <!-- Front Left Paw -->
                    <g class="paw">
                        <ellipse cx="110" cy="310" rx="25" ry="35" fill="#FFA366" stroke="#FF8C42" stroke-width="2"/>
                        <circle cx="95" cy="335" r="10" fill="#FFD4B4"/>
                        <circle cx="110" cy="342" r="10" fill="#FFD4B4"/>
                        <circle cx="125" cy="335" r="10" fill="#FFD4B4"/>
                    </g>
                    
                    <!-- Front Right Paw -->
                    <g class="paw" style="animation-delay: 0.2s;">
                        <ellipse cx="190" cy="310" rx="25" ry="35" fill="#FFA366" stroke="#FF8C42" stroke-width="2"/>
                        <circle cx="175" cy="335" r="10" fill="#FFD4B4"/>
                        <circle cx="190" cy="342" r="10" fill="#FFD4B4"/>
                        <circle cx="205" cy="335" r="10" fill="#FFD4B4"/>
                    </g>
                    
                    <!-- Rosy Cheeks -->
                    <circle cx="75" cy="120" r="18" fill="#FFB3BA" opacity="0.4"/>
                    <circle cx="225" cy="120" r="18" fill="#FFB3BA" opacity="0.4"/>
                </svg>
            </div>
            <div class="mantra-container">
                <p id="mantra-text">Nam mô A Di Đà Phật...</p>
            </div>
        </section>

        <section class="stats-section">
            <div class="stat-card">
                <span class="label">Công Đức Hiện Tại</span>
                <span id="merit-count" class="value">0</span>
            </div>
        </section>

        <footer class="footer">
            <div class="mo-container" id="mo-button">
                <div class="mo-icon">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="45" fill="#5D4037" stroke="#D4AF37" stroke-width="3"/>
                        <path d="M20 50 Q 50 20 80 50 Q 50 80 20 50" fill="#3E2723" opacity="0.6"/>
                        <circle cx="50" cy="50" r="10" fill="#D4AF37" opacity="0.8"/>
                    </svg>
                </div>
                <span class="mo-label">GÕ MÕ TÍCH CÔNG ĐỨC</span>
            </div>
        </footer>
    </main>

    <div id="float-container"></div>

    <script src="app.js"></script>
</body>
</html>
