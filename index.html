<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mèo Vô Tri Khấn Phật - Tích Công Đức Online</title>
    <meta name="description" content="Ứng dụng tích công đức online cùng mèo vô tri. Tịnh tâm và thư giãn.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stars-container" id="stars"></div>
    <div class="lotus-container" id="lotus-petals"></div>

    <main class="app-container">
        <header class="header">
            <h1 class="title">MÈO VÔ TRI <span class="accent">KHẤN PHẬT</span></h1>
            <p class="subtitle">Tâm bất biến giữa dòng đời vạn biến</p>
        </header>

        <section class="cat-section">
            <div class="aura"></div>
            <div class="cat-frame">
                <svg id="cat-image" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg" class="cat-svg">
                    <defs>
                        <style>
                            @keyframes tailWag { 
                                0%, 100% { transform: rotate(0deg); }
                                25% { transform: rotate(15deg); }
                                75% { transform: rotate(-15deg); }
                            }
                            @keyframes earWiggle {
                                0%, 100% { transform: rotate(0deg); }
                                50% { transform: rotate(-10deg); }
                            }
                            @keyframes eyeBlink {
                                0%, 49%, 100% { cy: 80; }
                                50%, 51% { cy: 90; }
                            }
                            @keyframes mouthSmile {
                                0%, 100% { d: path("M 100 120 Q 100 130 85 135"); }
                                50% { d: path("M 100 120 Q 100 135 85 138"); }
                            }
                            .tail { transform-origin: 160px 140px; animation: tailWag 1.5s infinite ease-in-out; }
                            .ear { transform-origin: center; animation: earWiggle 2s infinite ease-in-out; }
                            .left-eye { animation: eyeBlink 3s infinite; }
                            .right-eye { animation: eyeBlink 3s infinite 1s; }
                            .mouth { animation: mouthSmile 2s infinite ease-in-out; }
                        </style>
                    </defs>
                    
                    <!-- Tail -->
                    <path class="tail" d="M 160 140 Q 180 120 175 80" stroke="#FF9A56" stroke-width="16" fill="none" stroke-linecap="round"/>
                    
                    <!-- Body -->
                    <ellipse cx="100" cy="160" rx="45" ry="50" fill="#FF9A56"/>
                    
                    <!-- Head -->
                    <circle cx="100" cy="80" r="45" fill="#FF9A56"/>
                    
                    <!-- Left Ear -->
                    <g class="ear" style="transform-origin: 70px 50px;">
                        <polygon points="70,50 60,20 80,30" fill="#FF9A56"/>
                        <polygon points="70,50 65,25 75,32" fill="#FFB3A8"/>
                    </g>
                    
                    <!-- Right Ear -->
                    <g class="ear" style="transform-origin: 130px 50px;">
                        <polygon points="130,50 140,20 120,30" fill="#FF9A56"/>
                        <polygon points="130,50 135,25 125,32" fill="#FFB3A8"/>
                    </g>
                    
                    <!-- Left Eye -->
                    <circle class="left-eye" cx="85" cy="80" r="8" fill="white"/>
                    <circle cx="85" cy="85" r="5" fill="black"/>
                    <circle cx="87" cy="83" r="2" fill="white"/>
                    
                    <!-- Right Eye -->
                    <circle class="right-eye" cx="115" cy="80" r="8" fill="white"/>
                    <circle cx="115" cy="85" r="5" fill="black"/>
                    <circle cx="117" cy="83" r="2" fill="white"/>
                    
                    <!-- Nose -->
                    <path d="M 100 110 L 95 120 L 105 120 Z" fill="#FFB3A8"/>
                    
                    <!-- Mouth -->
                    <path class="mouth" d="M 100 120 Q 100 130 85 135" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
                    <path d="M 100 120 Q 100 130 115 135" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
                    
                    <!-- Whiskers Left -->
                    <line x1="60" y1="100" x2="30" y2="95" stroke="#000" stroke-width="1.5"/>
                    <line x1="60" y1="110" x2="30" y2="115" stroke="#000" stroke-width="1.5"/>
                    <line x1="60" y1="120" x2="30" y2="130" stroke="#000" stroke-width="1.5"/>
                    
                    <!-- Whiskers Right -->
                    <line x1="140" y1="100" x2="170" y2="95" stroke="#000" stroke-width="1.5"/>
                    <line x1="140" y1="110" x2="170" y2="115" stroke="#000" stroke-width="1.5"/>
                    <line x1="140" y1="120" x2="170" y2="130" stroke="#000" stroke-width="1.5"/>
                    
                    <!-- Front Left Paw -->
                    <ellipse cx="80" cy="200" rx="12" ry="18" fill="#FF9A56"/>
                    
                    <!-- Front Right Paw -->
                    <ellipse cx="120" cy="200" rx="12" ry="18" fill="#FF9A56"/>
                </svg>
            </div>
                </svg>
            </div>
            <div class="mantra-container">
                <p id="mantra-text">Nam mô A Di Đà Phật...</p>
            </div>
        </section>

        <section class="stats-section">
            <div class="stat-card">
                <span class="label">Công Đức Hiện Tại</span>
                <span id="merit-count" class="value">0</span>
            </div>
        </section>

        <footer class="footer">
            <div class="mo-container" id="mo-button">
                <div class="mo-icon">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="45" fill="#5D4037" stroke="#D4AF37" stroke-width="3"/>
                        <path d="M20 50 Q 50 20 80 50 Q 50 80 20 50" fill="#3E2723" opacity="0.6"/>
                        <circle cx="50" cy="50" r="10" fill="#D4AF37" opacity="0.8"/>
                    </svg>
                </div>
                <span class="mo-label">GÕ MÕ TÍCH CÔNG ĐỨC</span>
            </div>
        </footer>
    </main>

    <div id="float-container"></div>

    <script src="app.js"></script>
</body>
</html>
